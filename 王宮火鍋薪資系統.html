<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="王宮薪資">
<title>王宮火鍋｜薪資管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F0E8;--bg2:#EDE6D6;--bg3:#E4D9C3;
  --panel:#FAF7F0;--panel2:#F2EBD9;
  --border:#C8B89A;--border2:#A89070;
  --gold:#B07D2E;--gold2:#8A6020;--gold-light:#D4A855;
  --text:#2C1F0E;--text2:#5C4A30;--text3:#8C7A60;
  --red:#8B2E2E;--green:#2E5E3A;--green2:#4A8A5E;--blue:#2E4A6E;--warn:#7A5020;
  --radius:8px;--radius-lg:12px;
  --nav-h:60px;--top-h:56px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:"Noto Sans TC",sans-serif;font-size:14px}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--top-h);background:var(--panel);border-bottom:2px solid var(--gold);display:flex;align-items:center;padding:0 12px;gap:10px;z-index:100;box-shadow:0 2px 8px rgba(44,31,14,0.08)}
.topbar-logo{font-family:"Noto Serif TC",serif;font-size:18px;font-weight:700;color:var(--text);letter-spacing:3px;position:relative;padding:0 8px}
.topbar-logo::before,.topbar-logo::after{content:"";position:absolute;top:50%;transform:translateY(-50%);width:2px;height:22px;background:var(--gold);border-radius:1px}
.topbar-logo::before{left:0}
.topbar-logo::after{right:0}
.topbar-sub{font-size:10px;color:var(--text3);margin-left:4px;white-space:nowrap}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.sync-badge{font-size:11px;padding:3px 8px;border-radius:20px;border:1px solid;white-space:nowrap}
.sync-ok{background:rgba(46,94,58,0.12);color:var(--green);border-color:rgba(46,94,58,0.25)}
.sync-off{background:rgba(139,46,46,0.10);color:var(--red);border-color:rgba(139,46,46,0.20)}
.sync-ing{background:rgba(176,125,46,0.12);color:var(--gold2);border-color:rgba(176,125,46,0.25)}
.settings-btn{background:none;border:0.5px solid var(--border);border-radius:var(--radius);padding:4px 8px;font-size:12px;color:var(--text2);cursor:pointer;font-family:"Noto Sans TC",sans-serif}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--panel);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(5,1fr);z-index:100;box-shadow:0 -2px 8px rgba(44,31,14,0.08)}
.bnav-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--text3);font-size:10px;font-family:"Noto Sans TC",sans-serif;padding:4px 0;transition:color 0.15s;position:relative}
.bnav-item svg{width:22px;height:22px;stroke-width:1.8}
.bnav-item.active{color:var(--gold);font-weight:500}
.bnav-badge{position:absolute;top:4px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:9px;padding:1px 4px;border-radius:8px;min-width:14px;text-align:center}

/* MAIN CONTENT */
.main{position:fixed;top:var(--top-h);left:0;right:0;bottom:var(--nav-h);overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px}

/* DESKTOP SIDEBAR */
.desktop-sidebar{display:none}
@media(min-width:769px){
  .topbar{height:64px;padding:0 24px;gap:16px}
  .topbar-logo{font-size:20px;letter-spacing:4px}
  .bottom-nav{display:none}
  .desktop-sidebar{display:block;position:fixed;top:64px;left:0;bottom:0;width:220px;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;z-index:50}
  .main{top:64px;left:220px;bottom:0;padding:24px}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--text2);font-size:13px;border-left:3px solid transparent;transition:all 0.15s}
  .nav-item:hover{background:var(--bg2);color:var(--text)}
  .nav-item.active{background:var(--bg2);color:var(--gold);border-left-color:var(--gold);font-weight:500}
  .nav-item svg{width:16px;height:16px;flex-shrink:0}
  .nav-section{padding:8px 16px 4px;font-size:10px;color:var(--text3);letter-spacing:0.1em;font-weight:500}
}

/* PAGES */
.page{display:none}
.page.active{display:block}

/* MORE MENU */
.more-menu{display:none;position:fixed;bottom:var(--nav-h);left:0;right:0;background:var(--panel);border-top:1px solid var(--border);z-index:99;box-shadow:0 -4px 16px rgba(44,31,14,0.12)}
.more-menu.open{display:block}
.more-item{display:flex;align-items:center;gap:12px;padding:13px 20px;font-size:14px;color:var(--text);cursor:pointer;border-bottom:0.5px solid var(--border)}
.more-item svg{width:18px;height:18px;stroke-width:1.8;color:var(--text3)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(44,31,14,0.5);z-index:200;align-items:center;justify-content:center;padding:12px}
.modal-overlay.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto}
.modal-title{font-family:"Noto Serif TC",serif;font-size:16px;font-weight:600;margin-bottom:16px;color:var(--text)}

/* COMPONENTS */
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:0.1em;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.page-header{margin-bottom:16px}
.page-header h2{font-family:"Noto Serif TC",serif;font-size:18px;font-weight:600;color:var(--text)}
.page-header p{font-size:12px;color:var(--text3);margin-top:3px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
@media(min-width:600px){.metric-grid{grid-template-columns:repeat(4,1fr)}}
.metric{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px}
.metric-label{font-size:11px;color:var(--text3);margin-bottom:4px}
.metric-value{font-size:20px;font-weight:600;font-family:"Noto Serif TC",serif;color:var(--text)}
.metric-value.green{color:var(--green2)}
.metric-value.red{color:var(--red)}
.metric-value.gold{color:var(--gold)}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.field label{font-size:12px;color:var(--text2);font-weight:500}
.field input,.field select,.field textarea{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;font-size:16px;color:var(--text);font-family:"Noto Sans TC",sans-serif;width:100%;-webkit-appearance:none}
.field input:focus,.field select:focus{outline:none;border-color:var(--gold);background:var(--panel)}
.field input[type=number]{text-align:right}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--panel2);color:var(--text);font-size:13px;cursor:pointer;font-family:"Noto Sans TC",sans-serif;transition:all 0.15s;-webkit-appearance:none}
.btn:active{opacity:0.8}
.btn.primary{background:var(--gold);color:#fff;border-color:var(--gold2)}
.btn.danger{background:var(--red);color:#fff;border-color:#6B1E1E}
.btn.sm{padding:6px 10px;font-size:12px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;display:inline-block}
.badge.full{background:rgba(46,94,58,0.15);color:var(--green)}
.badge.part{background:rgba(46,74,110,0.15);color:var(--blue)}
.badge.gold{background:rgba(176,125,46,0.15);color:var(--gold2)}
.badge.danger{background:rgba(139,46,46,0.15);color:var(--red)}
.notice{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:var(--radius);padding:9px 12px;font-size:12px;color:var(--text2);margin-bottom:10px}
.notice.ok{border-left-color:var(--green)}
.notice.warn{border-left-color:var(--warn)}
.notice.danger{border-left-color:var(--red)}
.divider{height:1px;background:var(--border);margin:12px 0}
table.data{width:100%;border-collapse:collapse;font-size:12px}
table.data th{background:var(--bg2);padding:7px 8px;text-align:left;font-size:11px;font-weight:500;color:var(--text3);border-bottom:1px solid var(--border)}
table.data td{padding:7px 8px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
table.data td.right{text-align:right}
table.data td.earn{color:var(--green2);font-weight:500}
table.data td.deduct{color:var(--red);font-weight:500}
table.data tr.total-row td{font-weight:600;border-top:2px solid var(--border2);background:var(--bg2)}
.emp-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;margin-bottom:8px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:10px}
.emp-card:active{background:var(--bg2)}
.emp-card.selected{border-color:var(--gold);background:var(--panel2)}
.emp-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--gold2);font-family:"Noto Serif TC",serif;flex-shrink:0}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-btn{padding:8px 14px;font-size:13px;border:none;background:none;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;font-family:"Noto Sans TC",sans-serif;white-space:nowrap;transition:all 0.15s}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:500}
.punch-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;padding:10px;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border)}
.punch-label{font-size:11px;color:var(--text3);margin-bottom:4px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{text-align:center;font-size:11px;color:var(--text3);padding:4px 0;font-weight:500}
.cal-day{border:1px solid var(--border);border-radius:var(--radius);padding:4px;min-height:60px;background:var(--panel);cursor:pointer;transition:border-color 0.1s;position:relative}
.cal-day:active{background:var(--bg2)}
.cal-day.selected-day{border:2px solid var(--gold)!important;box-shadow:0 0 0 1px var(--gold-light)}
.cal-day.holiday{background:rgba(139,46,46,0.06)}
.cal-day.work-day{background:rgba(46,94,58,0.06);border-color:rgba(46,94,58,0.3)}
.cal-day.off-day{background:var(--bg2)}
.cal-day-num{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:2px}
.cal-day.holiday .cal-day-num{color:var(--red)}
.cal-holiday-name{font-size:8px;color:var(--red);line-height:1.2}
.cal-status{font-size:9px;padding:1px 4px;border-radius:3px;display:inline-block}
.cal-status.work{background:rgba(46,94,58,0.15);color:var(--green)}
.cal-status.off{background:var(--bg3);color:var(--text3)}
.cal-status.hol{background:rgba(139,46,46,0.15);color:var(--red)}
.cal-ot{font-size:9px;color:var(--gold2);font-weight:500}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-title{font-family:"Noto Serif TC",serif;font-size:16px;font-weight:600;color:var(--text)}
/* 側欄 */
.sidebar-field{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.sidebar-field label{font-size:11px;color:var(--text2);font-weight:500}
.sidebar-field input,.sidebar-field select{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;font-size:15px;color:var(--text);width:100%}
.sidebar-field input:focus,.sidebar-field select:focus{outline:none;border-color:var(--gold)}
.punch-pair{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.day-sel-btn{border:1.5px solid var(--border);border-radius:var(--radius);padding:8px;text-align:center;cursor:pointer;font-size:13px;background:var(--panel);color:var(--text2);transition:all 0.15s;flex:1}
.day-sel-btn.active{border-color:var(--gold);background:var(--panel2);color:var(--gold);font-weight:500}
@media(min-width:700px){
  #att-layout{grid-template-columns:1fr 320px!important}
  #att-sidebar{display:block!important;min-height:100px}
}
.history-item{border-left:3px solid var(--border);padding:8px 12px;margin-bottom:8px;background:var(--panel);border-radius:0 var(--radius) var(--radius) 0}
.history-item.salary{border-left-color:var(--gold)}
.history-item.comp{border-left-color:var(--green)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-logo">王宮</div>
  <span class="topbar-sub">薪資系統 2026</span>
  <div class="topbar-right">
    <span id="sync-badge" class="sync-badge sync-off">未連接</span>
    <button class="settings-btn" onclick="openSettings()">⚙</button>
  </div>
</header>

<nav class="desktop-sidebar" id="desktop-sidebar">
  <div class="nav-section">主要功能</div>
  <div class="nav-item active" onclick="gotoPage('dashboard',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>總覽
  </div>
  <div class="nav-item" onclick="gotoPage('employees',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>員工管理
  </div>
  <div class="nav-item" onclick="gotoPage('attendance',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>打卡紀錄
  </div>
  <div class="nav-item" onclick="gotoPage('payroll',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>薪資計算
  </div>
  <div class="nav-section">其他</div>
  <div class="nav-item" onclick="gotoPage('leave',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>假勤管理
  </div>
  <div class="nav-item" onclick="gotoPage('export',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>匯出薪資單
  </div>
  <div class="nav-item" onclick="gotoPage('employer',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>雇主成本表
  </div>
  <div class="nav-item" onclick="gotoPage('history',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>歷史紀錄
  </div>
  <div class="nav-item" onclick="gotoPage('alerts',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>警示中心
    <span id="alert-badge-side" class="badge danger" style="margin-left:auto;display:none">0</span>
  </div>
</nav>

<main class="main" id="main-content">

<div id="page-dashboard" class="page active">
  <div class="page-header"><h2>總覽</h2><p id="dash-month-label"></p></div>
  <div class="metric-grid" id="dash-metrics"></div>
  <div class="card"><div class="card-title">本月員工概況</div><div id="dash-emp-list"></div></div>
  <div class="card"><div class="card-title">待處理事項</div><div id="dash-alerts"></div></div>
</div>

<div id="page-employees" class="page">
  <div class="page-header"><h2>員工管理</h2></div>
  <button class="btn primary" style="width:100%;margin-bottom:12px" onclick="addEmployee()">＋ 新增員工</button>
  <div id="emp-list-el"></div>
  <div id="emp-detail-el"></div>
</div>

<div id="page-attendance" class="page">
  <div class="page-header"><h2>打卡紀錄</h2></div>
  <!-- 篩選列 -->
  <div class="card" style="padding:12px 16px;margin-bottom:10px">
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <div class="field" style="margin:0;flex:0 0 140px"><label>員工</label><select id="att-emp" onchange="renderCal()"></select></div>
      <div class="field" style="margin:0;flex:0 0 130px"><label>年月</label><input type="month" id="att-month" onchange="renderCal()"></div>
      <div style="margin-left:auto;display:flex;gap:6px">
        <button class="btn sm" onclick="changeMonth(-1)">◀ 上月</button>
        <div class="cal-title" id="cal-title" style="font-family:'Noto Serif TC',serif;font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;padding:0 4px"></div>
        <button class="btn sm" onclick="changeMonth(1)">下月 ▶</button>
      </div>
    </div>
  </div>
  <!-- 月曆+側欄雙欄 -->
  <div id="att-layout" style="display:grid;grid-template-columns:1fr;gap:10px">
    <!-- 月曆 -->
    <div class="card" style="padding:12px">
      <div class="cal-grid" id="cal-grid">
        <div class="cal-dow">日</div><div class="cal-dow">一</div><div class="cal-dow">二</div>
        <div class="cal-dow">三</div><div class="cal-dow">四</div><div class="cal-dow">五</div><div class="cal-dow">六</div>
      </div>
    </div>
    <!-- 側欄：點日期後顯示 -->
    <div id="att-sidebar" style="display:none">
      <div class="card" id="att-sidebar-content"></div>
    </div>
  </div>
  <!-- 本月統計 -->
  <div class="card" style="margin-top:10px"><div class="card-title">本月統計</div><div id="att-summary"></div></div>
</div>

<div id="page-payroll" class="page">
  <div class="page-header"><h2>薪資計算</h2></div>
  <div class="card">
    <div class="grid2">
      <div class="field"><label>員工</label><select id="pay-emp" onchange="renderPayroll()"></select></div>
      <div class="field"><label>月份</label><input type="month" id="pay-month" onchange="renderPayroll()"></div>
    </div>
    <div class="btn-row">
      <button class="btn primary" onclick="sealMonth()">🔒 封存本月</button>
      <button class="btn" onclick="renderPayroll()">↻ 重算</button>
    </div>
  </div>
  <div id="payroll-result"></div>
</div>

<div id="page-leave" class="page">
  <div class="page-header"><h2>假勤管理</h2></div>
  <div class="field" style="max-width:200px"><label>員工</label><select id="leave-emp" onchange="renderLeave()"></select></div>
  <div id="leave-content"></div>
</div>

<div id="page-export" class="page">
  <div class="page-header"><h2>匯出薪資單</h2></div>
  <div class="card">
    <div class="grid2">
      <div class="field"><label>員工</label><select id="exp-emp"><option value="all">全部員工</option></select></div>
      <div class="field"><label>月份</label><input type="month" id="exp-month"></div>
    </div>

function minDiff(a,b){if(!a||!b)return 0;const[ah,am]=a.split(':').map(Number);const[bh,bm]=b.split(':').map(Number);const d=(bh*60+bm)-(ah*60+am);return d<0?d+1440:d}
function timeToMin(t){
  if(!t)return -1;
  const parts=t.split(':');
  if(parts.length<2)return -1;
  return parseInt(parts[0])*60+parseInt(parts[1]);
}
function calcWorkedMins(in1,out1,restIn,restOut){
  const s=timeToMin(in1);const e=timeToMin(out1);
  if(s<0||e<0)return 0;
  // 跨日處理
  let gross=e>=s?(e-s):(e+1440-s);
  // 扣休息
  const rs=timeToMin(restIn);const re=timeToMin(restOut);
  let rest=0;
  if(rs>=0&&re>=0){
    rest=re>=rs?(re-rs):(re+1440-rs);
  }
  return Math.max(0,gross-rest);
}
function calcDisplayHours(dd){
  if(!dd)return '';

  if(dd.in2&&dd.out2)t+=calcWorkedMins(dd.in2,dd.out2,dd.restIn2||'',dd.restOut2||'');
  if(dd.in3&&dd.out3)t+=calcWorkedMins(dd.in3,dd.out3,dd.restIn3||'',dd.restOut3||'');

  const h=Math.floor(t/60);const m=t%60;

function jsonp(url,ok,err){
  const cb='cb_'+Date.now();
  const sc=document.createElement('script');
  const t=setTimeout(()=>{cleanup();err&&err()},8000);
  function cleanup(){clearTimeout(t);delete window[cb];if(sc.parentNode)sc.parentNode.removeChild(sc)}
  window[cb]=d=>{cleanup();ok&&ok(d)};
  sc.src=url+'&callback='+cb;
  sc.onerror=()=>{cleanup();err&&err()};
  document.head.appendChild(sc);
}

let calY=new Date().getFullYear(),calM=new Date().getMonth();
let modalEmpId='',modalDs='',modalD=0,selectedDay=0;
function renderCal(){
  const empId=document.getElementById('att-emp').value;
  const mv=document.getElementById('att-month').value;
  if(mv){const p=mv.split('-');calY=+p[0];calM=+p[1]-1}
  document.getElementById('cal-title').textContent=`${calY}年${calM+1}月`;
  const key=`${empId}_${calY}-${String(calM+1).padStart(2,'0')}`;
  const days=((db.attendance[key]||{}).days)||{};
  const grid=document.getElementById('cal-grid');
  while(grid.children.length>7)grid.removeChild(grid.lastChild);
  const fd=new Date(calY,calM,1).getDay();
  const dim=new Date(calY,calM+1,0).getDate();
  const td=today();
  for(let i=0;i<fd;i++){const b=document.createElement('div');b.className='cal-day';b.style.opacity='0';grid.appendChild(b)}
  for(let d=1;d<=dim;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dd=days[d]||{status:'off'};
    const hname=HOLIDAYS[ds];const isH=!!hname;  // 只有國定假日才標紅
    const dow=['日','一','二','三','四','五','六'][new Date(ds+'T00:00:00').getDay()];
    let cls='cal-day'+(selectedDay===d?' selected-day':'');
    if(dd.status==='work')cls+=' work-day';else if(dd.status==='off')cls+=' off-day';
    if(hname)cls+=' holiday';  // 只有國定假日標紅
    const cell=document.createElement('div');cell.className=cls;
    cell.onclick=()=>empId?openSidebar(empId,ds,d):alert('請先選擇員工');
    let inner=`<div class="cal-day-num">${d}<span style="font-size:9px;color:var(--text3);margin-left:2px">${dow}</span></div>`;
    if(hname)inner+=`<div class="cal-holiday-name">${hname}</div>`;
    if(dd.status==='work'){
      let statusLabel='出勤';let statusCls='work';
      if(isH){statusLabel='國定假日';statusCls='hol'}
      inner+=`<span class="cal-status ${statusCls}">${statusLabel}</span>`;
      if(dd.holType==='double')inner+=`<div style="font-size:8px;color:var(--red);font-weight:600">雙倍薪</div>`;
      else if(dd.holType==='comp')inner+=`<div style="font-size:8px;color:var(--green)">補休+1</div>`;
      const worked=dayWorked(dd);const ot=dayOT(dd);
      if(worked>0)inner+=`<div style="font-size:9px;color:var(--text3)">${calcDisplayHours(dd)}</div>`;
      if(ot>0&&dd.holType!=='double')inner+=`<div class="cal-ot">OT${ot.toFixed(1)}h</div>`;
      if(dd.meal)inner+=`<div style="font-size:8px;color:var(--gold2)">餐$${MEAL}</div>`;
    }else if(dd.status==='leave'){
      inner+=`<span class="cal-status" style="background:rgba(46,74,110,0.12);color:var(--blue)">${leaveL(dd.leaveType)}</span>`;
    }else{inner+=`<span class="cal-status off">休</span>`}
    cell.innerHTML=inner;grid.appendChild(cell);
  }
  renderAttSummary(empId);
}
function leaveL(t){return{annual:'特休',sick:'病假',personal:'事假',physio:'生理',wedding:'婚假',funeral:'喪假',comp:'補休'}[t]||t}
function changeMonth(d){calM+=d;if(calM>11){calM=0;calY++}if(calM<0){calM=11;calY--}document.getElementById('att-month').value=`${calY}-${String(calM+1).padStart(2,'0')}`;renderCal()}
function renderAttSummary(empId){

// PAYROLL
function calcPay(empId,month){
  const e=getEmp(empId);if(!e)return null;
  const[y,m]=month.split('-').map(Number);
  const dim=new Date(y,m,0).getDate();
  const key=`${empId}_${month}`;
  const days=((db.attendance[key]||{}).days)||{};
  const isP=e.type==='part';
  const dr=isP?(e.base*8):(e.base/30);
  const hr=isP?e.base:(e.base/30/8);
  let wd=0,otPay=0,holPay=0,mealPay=0,lateMin=0;
  const ls={annual:0,sick:0,personal:0,physio:0,wedding:0,funeral:0,comp:0};
  for(let d=1;d<=dim;d++){
    const dd=days[d]||{status:'off'};
    const ds=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(dd.status==='work'){
      wd++;if(dd.meal)mealPay+=MEAL;if(dd.lateMins)lateMin+=dd.lateMins;
      const wh=dayWorked(dd);const ot=Math.max(0,wh-8);
      // 國定假日雙倍薪（由使用者選擇）
      if(isHol(ds)&&dd.holType==='double'){
        holPay+=Math.round(dr); // 雙倍薪差額（再加一倍）
      } else if(dd.holType==='double'&&!isHol(ds)){
        // 非國定假日但手動選雙倍薪
        holPay+=Math.round(dr);
      }
      // 加班費（正常排班超時）
      if(ot>0&&dd.holType!=='double'){
        const o1=Math.min(ot,2);const o2=Math.max(0,ot-2);
        otPay+=Math.round(o1*hr*1.34+o2*hr*1.67);
      }
    }
    if(dd.status==='leave'&&dd.leaveType)ls[dd.leaveType]=(ls[dd.leaveType]||0)+1;
  }
  const bp=isP?(e.base*(e.hours||0)):e.base;
  const ld=Math.round(Math.ceil(lateMin/30)*(hr/2));
  const sd=Math.round((ls.sick||0)*dr*0.5);
  const pd=Math.round((ls.personal||0)*dr);
  const ib=e.base+(e.job||0);
  const lab=ins(ib,LABOR);const hea=ins(ib,HEALTH);const ret=Math.round(ib*RETIRE);
  const shiftPay=e.shift||0;
  const customTotal=(e.customs||[]).reduce((s,c)=>s+(+c.amount||0),0);
  const earn=bp+(e.job||0)+(e.attend||0)+(e.meal||0)+(e.perf||0)+(e.other||0)+shiftPay+customTotal+otPay+holPay+mealPay;
  const deduct=lab.emp+hea.emp+ld+sd+pd;
  return{e,month,bp,otPay,holPay,mealPay,ld,sd,pd,lab,hea,ret,earn,deduct,net:earn-deduct,ls,lateMin,wd,dr,hr,ib,job:e.job||0,attend:e.attend||0,meal:e.meal||0,perf:e.perf||0,other:e.other||0,othername:e.othername||'',shiftPay,customTotal,customs:e.customs||[]};
}

    comps.forEach(c=>{const dl=new Date(c.deadline+'T00:00:00');const left=Math.floor((dl-now)/(24*3600*1000));const rem=c.days-c.used;if(rem>0&&left<=30&&left>0)alerts.push({icon:'⏰',title:`${e.name} 補休即將到期`,desc:`${rem}天補休，${left}天後到期`,level:'warn'});if(rem>0&&left<=0)alerts.push({icon:'❌',title:`${e.name} 補休已到期`,desc:`${rem}天補休超過期限，請補發工資`,level:'danger'})});
    if(e.type==='part'){const m=thisMonth();const days=((db.attendance[`${e.id}_${m}`]||{}).days)||{};let th=0;Object.values(days).forEach(d=>{if(d.status==='work')th+=dayWorked(d)});if(th>130)alerts.push({icon:'⚠',title:`${e.name} 工讀時數超標`,desc:`本月${th.toFixed(1)}小時，建議確認投保級距`,level:'warn'})}
    if(now.getMonth()===11){const yrs=sen(e.hire);if(annDays(yrs)>0)alerts.push({icon:'📅',title:`${e.name} 年度特休將到期`,desc:'年底前請確認特休是否排休',level:'warn'})}
  });
  return alerts;
}
function renderAlerts(){
  const alerts=genAlerts();
  const el=document.getElementById('alerts-content');if(!el)return;
  const ab=document.getElementById('alert-badge');const as=document.getElementById('alert-badge-side');
  if(ab){ab.textContent=alerts.length;ab.style.display=alerts.length>0?'':' none'}
  if(as){as.textContent=alerts.length;as.style.display=alerts.length>0?'':' none'}
  if(!alerts.length){el.innerHTML='<div class="notice ok">✓ 目前無待處理警示</div>';return}
  el.innerHTML=alerts.map(a=>`<div class="card" style="display:flex;gap:12px;align-items:flex-start"><div style="font-size:20px">${a.icon}</div><div style="flex:1"><div style="font-size:13px;font-weight:500;margin-bottom:3px">${a.title}</div><div style="font-size:12px;color:var(--text3)">${a.desc}</div></div><span class="badge ${a.level==='danger'?'danger':'gold'}">${a.level==='danger'?'緊急':'注意'}</span></div>`).join('');
}

function doExportCSV(){

  list.forEach(e=>{const p=db.sealed[`${e.id}_${month}`]||calcPay(e.id,month);if(!p)return;rows.push([e.name,e.type==='full'?'正職':'工讀',e.hire||'',sen(e.hire)+'年',Math.round(p.bp),Math.round(p.job),Math.round(p.attend),Math.round(p.meal),Math.round(p.perf),Math.round(p.other),Math.round(p.otPay),Math.round(p.holPay),Math.round(p.mealPay),Math.round(p.lab.emp),Math.round(p.hea.emp),Math.round(p.ld),Math.round(p.sd),Math.round(p.pd),Math.round(p.earn),Math.round(p.deduct),Math.round(p.net),e.bank?'****'+e.bank:'',e.bankname||''].join(','))});

// AUTO SAVE — 監聽所有輸入事件自動儲存
function autoSaveSetup(){
  // 防抖：輸入停止500ms後儲存
  let autoSaveTimer=null;
  function triggerAutoSave(){
    clearTimeout(autoSaveTimer);
    autoSaveTimer=setTimeout(()=>{
      // 把目前正在編輯的員工欄位寫回db
      autoSaveCurrentEmp();
      autoSaveCurrentDay();
      syncSheets();
    },500);
  }

  // 監聽所有 input/select/textarea/checkbox 變化
  document.addEventListener('input', triggerAutoSave, true);
  document.addEventListener('change', triggerAutoSave, true);
}

function autoSaveCurrentEmp(){

  // 基本資料
  const name=document.getElementById('e-name');if(name)e.name=name.value;

  const bank=document.getElementById('e-bank');if(bank)e.bank=bank.value;

  const note=document.getElementById('e-note');if(note)e.note=note.value;

function autoSaveCurrentDay(){
  if(!modalEmpId||!modalDs||!modalD)return;
  const empId=modalEmpId;const d=modalD;
  const key=`${empId}_${calY}-${String(calM+1).padStart(2,'0')}`;
  if(!db.attendance[key]||!db.attendance[key].days[d])return;
  const dd=db.attendance[key].days[d];
  if(dd.status!=='work')return;
  // 更新打卡時間
  const fields=['in1','out1','restin','restout','in2','out2','restin2','restout2','in3','out3','restin3','restout3'];
  const keys= ['in1','out1','restIn','restOut','in2','out2','restIn2','restOut2','in3','out3','restIn3','restOut3'];
  fields.forEach((f,i)=>{
    const el=document.getElementById('sb-'+f);
    if(el)dd[keys[i]]=el.value||'';
  });
  const late=document.getElementById('sb-late');if(late)dd.lateMins=+late.value||0;
  const meal=document.getElementById('sb-meal');if(meal)dd.meal=meal.checked;
  const note=document.getElementById('sb-note');if(note)dd.note=note.value;
  const rads=document.querySelectorAll('input[name="sb-ht"]');
  rads.forEach(r=>{if(r.checked)dd.holType=r.value});
  localStorage.setItem('wg',JSON.stringify(db));
}
